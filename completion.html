<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Say Hello! - Good Job!</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700;900&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="completion.css">
</head>
<body>

    <!-- Full background image — swap filename to your completion bg -->
    <!-- Characters placed at corners -->
    <img class="char char-tl" src="images/Interactive-Web_Tiny-Person_GERMAN.png"  alt="German character" />
    <img class="char char-tr" src="images/Interactive-Web_Tiny-Person_GREEK.png"   alt="Greek character" />
    <img class="char char-bl" src="images/Interactive-Web_Tiny-Person_TAGALOG.png" alt="Tagalog character" />
    <img class="char char-br" src="images/Interactive-Web_Tiny-Person_FRENCH.png"  alt="French character" />

    <!-- GOOD JOB! — top half -->
    <div class="text-block top">
        <div class="big-line">
            <span class="letter white">G</span>
            <span class="letter white">O</span>
            <span class="letter white">O</span>
            <span class="letter white">D</span>
        </div>
        <div class="big-line">
            <span class="letter white">J</span>
            <span class="letter green">O</span>
            <span class="letter white">B</span>
            <span class="letter white">!</span>
        </div>
    </div>

    <!-- PLAY AGAIN? — bottom half -->
    <div class="text-block bottom">
        <div class="big-line">
            <span class="letter green">P</span>
            <span class="letter white">L</span>
            <span class="letter white">A</span>
            <span class="letter green">Y</span>
        </div>
        <div class="big-line">
            <span class="letter white">A</span>
            <span class="letter white">G</span>
            <span class="letter white">A</span>
            <span class="letter green">I</span>
            <span class="letter white">N</span>
            <span class="letter white">?</span>
        </div>
    </div>

    <!-- PLAY AGAIN clickable overlay (whole bottom half) -->
    <a class="play-again-overlay" href="index.html"></a>

    <!-- QUIT button bottom right -->
    <button class="btn-quit" onclick="location.href='index.html'">QUIT</button>

</body>
</html>
