<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Say Hello! - Good Job!</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700;900&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="completion.css">
</head>
<body>

    <img class="char char-tl" src="images/Interactive-Web_Tiny-Person_GERMAN.png"  alt="German character" />
    <img class="char char-tr" src="images/Interactive-Web_Tiny-Person_GREEK.png"   alt="Greek character" />
    <img class="char char-bl" src="images/Interactive-Web_Tiny-Person_TAGALOG.png" alt="Tagalog character" />
    <img class="char char-br" src="images/Interactive-Web_Tiny-Person_FRENCH.png"  alt="French character" />

    <div class="completion-good">
        <div class="completion-line">
            <span class="completion-letter white">G</span>
            <span class="completion-letter white">O</span>
            <span class="completion-letter white">O</span>
            <span class="completion-letter white">D</span>
        </div>
    </div>

    <div class="completion-job">
        <div class="completion-line">
            <span class="completion-letter white">J</span>
            <span class="completion-letter green">O</span>
            <span class="completion-letter white">B</span>
            <span class="completion-letter white">!</span>
        </div>
    </div>

    <div class="completion-play">
        <div class="completion-line">
            <span class="completion-letter green">P</span>
            <span class="completion-letter white">L</span>
            <span class="completion-letter white"> </span>
            <span class="completion-letter white">A</span>
            <span class="completion-letter green">Y</span>
        </div>
    </div>

    <div class="completion-again">
        <div class="completion-line">
            <span class="completion-letter white">A</span>
            <span class="completion-letter white">G</span>
            <span class="completion-letter white">A</span>
            <span class="completion-letter white"> </span>
            <span class="completion-letter white"> </span>
            <span class="completion-letter green">I</span>
            <span class="completion-letter white"> </span>
            <span class="completion-letter white">N</span>
            <span class="completion-letter white">?</span>
        </div>
    </div>


    <a class="play-again-overlay" href="index.html"></a>

    <button class="btn-quit" onclick="location.href='index.html'">QUIT</button>

</body>
</html>
